<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1F3D2B" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kingdoms Touch" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="description"
      content="Capture photos, GPS and completion reports in the field. Works offline."
    />
    <title>Kingdoms Touch Services · Field Reports</title>

    <!-- Capture the install prompt as early as possible so an in-app
         "Install app" button can trigger it later. -->
    <script>
      (function () {
        window.__ktInstall = null;
        window.addEventListener('beforeinstallprompt', function (e) {
          e.preventDefault();
          window.__ktInstall = e;
          window.dispatchEvent(new Event('kt-installable'));
        });
        window.addEventListener('appinstalled', function () {
          window.__ktInstall = null;
          window.dispatchEvent(new Event('kt-installed'));
        });
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload the login logo (LCP element) -->
    <link rel="preload" as="image" href="/brand/logo-full-transparent.webp" />
    <!-- Load fonts non-render-blocking; swap in once ready -->
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;1,400;1,500&display=optional"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;1,400;1,500&display=optional"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root">
      <!-- Static paint shell: shows instantly (before JS) so FCP/LCP fire on
           the preloaded logo, not after the React bundle executes. React
           replaces it on mount; the logo sits in the same spot → no shift. -->
      <div
        style="
          position: fixed;
          inset: 0;
          background: #f7f3e8;
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 52px 28px 30px;
          box-sizing: border-box;
        "
      >
        <img
          src="/brand/logo-full-transparent.webp"
          alt="Kingdoms Touch Services"
          width="208"
          height="200"
          fetchpriority="high"
          style="width: 208px; max-width: 78%; height: auto; aspect-ratio: 1600 / 1538;"
        />
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
