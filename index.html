<!doctype html>
<html lang="en">

    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta

      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1F3D2B" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kingdoms Touch" />

    <meta
      name="description"
      content="Capture photos, GPS and completion reports in the field. Works offline."
    />
    <title>Kingdoms Touch Services · Field Reports</title>

    <!-- Self-heal a stale app shell. If a hashed chunk fails to load (a
         returning client whose cached index references a now-deleted hash, or
         a chunk served as HTML), the module bundle dies before React can mount
         and the app is blank. This inline script runs regardless: on such an
         error it clears the service worker + caches and reloads ONCE. -->
    <script>
      (function () {
        var HEAL_KEY = 'kt:sw-heal';
        function looksStale(msg, target) {
          if (
            target &&
            target.tagName === 'SCRIPT' &&
            target.src &&
            /\/assets\/.*\.js/.test(target.src)
          )
            return true;
          if (!msg) return false;
          return /module script|dynamically imported module|Loading chunk|Importing a module script failed|Failed to fetch dynamically|MIME type|Unexpected token '<'/i.test(
            msg,
          );
        }
        var healing = false;
        function heal() {
          if (healing) return;
          healing = true;
          try {
            if (sessionStorage.getItem(HEAL_KEY)) return; // already tried this session
            sessionStorage.setItem(HEAL_KEY, '1');
          } catch (e) {
            /* ignore */
          }
          var reload = function () {
            try {
              location.reload();
            } catch (e) {
              /* ignore */
            }
          };
          var tasks = [];
          try {
            if ('serviceWorker' in navigator) {
              tasks.push(
                navigator.serviceWorker
                  .getRegistrations()
                  .then(function (rs) {
                    return Promise.all(
                      rs.map(function (r) {
                        return r.unregister();
                      }),
                    );
                  })
                  .catch(function () {}),
              );
            }
            if (window.caches && caches.keys) {
              tasks.push(
                caches
                  .keys()
                  .then(function (ks) {
                    return Promise.all(
                      ks.map(function (k) {
                        return caches.delete(k);
                      }),
                    );
                  })
                  .catch(function () {}),
              );
            }
          } catch (e) {
            /* ignore */
          }
          Promise.all(tasks).then(reload, reload);
          setTimeout(reload, 1500); // safety net if the clears hang
        }
        window.addEventListener(
          'error',
          function (e) {
            if (looksStale(e && e.message, e && e.target)) heal();
          },
          true,
        );
        window.addEventListener('unhandledrejection', function (e) {
          var r = e && e.reason;
          var msg = r && (r.message || String(r));
          if (looksStale(msg, null)) heal();
        });
      })();
    </script>

    <!-- Capture the install prompt as early as possible so an in-app
         "Install app" button can trigger it later. -->
    <script>
      (function () {
        window.__ktInstall = null;
        window.addEventListener('beforeinstallprompt', function (e) {
          e.preventDefault();
          window.__ktInstall = e;
          window.dispatchEvent(new Event('kt-installable'));
        });
        window.addEventListener('appinstalled', function () {
          window.__ktInstall = null;
          window.dispatchEvent(new Event('kt-installed'));
        });
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload the login logo (LCP element) -->
    <link rel="preload" as="image" href="/brand/logo-full-transparent.webp" />
    <!-- Load fonts non-render-blocking; swap in once ready -->
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;1,400;1,500&display=optional"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;1,400;1,500&display=optional"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root">
      <!-- Static paint shell: shows instantly (before JS) so FCP/LCP fire on
           the preloaded logo, not after the React bundle executes. React
           replaces it on mount; the logo sits in the same spot → no shift. -->
      <div
        style="
          position: fixed;
          inset: 0;
          background: #f7f3e8;
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 52px 28px 30px;
          box-sizing: border-box;
        "
      >
        <img
          src="/brand/logo-full-transparent.webp"
          alt="Kingdoms Touch Services"
          width="208"
          height="200"
          fetchpriority="high"
          style="width: 208px; max-width: 78%; height: auto; aspect-ratio: 1600 / 1538;"
        />
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
