# ─── Netlify config for Kingdoms Touch Services · Field Reports PWA ───────
[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# Single-page-app fallback — every unknown path renders index.html so React
# Router can match the route client-side.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Caching strategy ───────────────────────────────────────
# Aggressive cache for hashed assets; never cache the SW or manifest.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/manifest+json"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"
    Permissions-Policy    = "camera=(self), geolocation=(self)"
