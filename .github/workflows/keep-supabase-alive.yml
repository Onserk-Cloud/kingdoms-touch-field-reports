name: Keep Supabase awake

# El plan gratis de Supabase pausa el proyecto tras ~7 días sin actividad.
# Este cron le hace un ping diario para que nunca se pause.
# (Los workflows programados solo corren desde la rama por defecto: main.)

on:
  schedule:
    - cron: '17 8 * * *' # todos los días ~08:17 UTC
  workflow_dispatch: {} # permite dispararlo a mano desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (REST + Auth health)
        env:
          SUPABASE_URL: https://siphkouwkdbouktpmmpo.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -e
          # Consulta REST real (toca Postgres → cuenta como actividad).
          rest=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${SUPABASE_URL}/rest/v1/employees?select=id&limit=1")
          echo "REST /employees -> HTTP ${rest}"
          # Salud del servicio de auth (siempre 200).
          auth=$(curl -s -o /dev/null -w "%{http_code}" "${SUPABASE_URL}/auth/v1/health")
          echo "Auth /health   -> HTTP ${auth}"
          echo "Ping done."
